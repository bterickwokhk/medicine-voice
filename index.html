<!DOCTYPE html>
<html lang="zh-HK">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
🎤 藥物語音搜尋
</title>


<style>

body{

font-family:Arial;

text-align:center;

padding:30px;

background:#f5f7fb;

}


button{

font-size:25px;

padding:15px 35px;

border-radius:20px;

border:none;

cursor:pointer;

}


#result{

margin-top:30px;

font-size:22px;

}


.card{

background:white;

border-radius:15px;

padding:15px;

margin:15px auto;

max-width:400px;

box-shadow:0 2px 8px #ccc;

}


</style>


</head>


<body>


<h1>
🎤 藥物語音搜尋
</h1>


<button onclick="startVoice()">

開始說藥名

</button>



<div id="result">

等待輸入...

</div>




<script>


// 改成你的 Apps Script Web App URL

const API_URL =
"https://script.google.com/macros/s/你的WEBAPP_ID/exec";




const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;



if(!SpeechRecognition){

alert(
"請使用 Chrome 瀏覽器"
);

}



const recognition =
new SpeechRecognition();



recognition.lang="zh-HK";


recognition.continuous=false;


recognition.interimResults=false;


recognition.maxAlternatives=5;





function startVoice(){


document.getElementById(
"result"
).innerHTML=
"🎤 請說藥物名稱";


recognition.start();


}





recognition.onresult=function(event){


let word =
event.results[0][0].transcript;



document.getElementById(
"result"
).innerHTML=
"搜尋："+word;



searchMedicine(word);



};





recognition.onerror=function(e){


document.getElementById(
"result"
).innerHTML=
"錯誤："+e.error;


};






function searchMedicine(word){


fetch(
API_URL+
"?name="+
encodeURIComponent(word)

)


.then(
response=>response.json()
)


.then(
data=>{


showResult(data);


}

);


}







function showResult(data){


let html="";



if(data.length===0){


html="❌ 找不到藥物";


}


else{


data.forEach(item=>{


html+=`

<div class="card">

<h2>
${item.name}
</h2>


藥號：
${item.code}

<br>

位置：
${item.location}

<br>

存量：
${item.stock}

<br>

匹配度：
${item.score}%

</div>

`;


});


}



document.getElementById(
"result"
).innerHTML=html;


}



</script>



</body>


</html>
